<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">WAYD: a meme-y social feed for programmers, built on GitHub Issues.</title>
  <desc id="desc">Hero banner explaining WAYD in three steps: post a vibe, scroll a random feed of other programmers' posts, react and reply. Eight available vibes shown at the bottom: cursed-code, rip-me, brain-melt, dark-arts, hot-take, shower-thought, existential, procrastinating.</desc>

  <defs>
    <!-- Background gradient: dark blueprint -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1f2e"/>
    </linearGradient>

    <!-- Title accent gradient -->
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#79c0ff"/>
      <stop offset="50%" stop-color="#d2a8ff"/>
      <stop offset="100%" stop-color="#ff7b72"/>
    </linearGradient>

    <!-- Step number circle gradient -->
    <linearGradient id="numGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3d2a5c"/>
      <stop offset="100%" stop-color="#1f1638"/>
    </linearGradient>

    <!-- Soft outer glow on the title -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Reusable step card background -->
    <symbol id="stepCard" overflow="visible">
      <rect x="0" y="0" rx="14" ry="14" width="370" height="180" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    </symbol>

    <!-- Reusable vibe chip -->
    <symbol id="vibeChip" overflow="visible">
      <rect x="0" y="0" rx="18" ry="18" width="146" height="40" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    </symbol>

    <style>
      .mono { font-family: "JetBrains Mono", "Fira Code", "SF Mono", Menlo, Consolas, monospace; }
      .sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif; }
    </style>
  </defs>

  <!-- Page background -->
  <rect width="1280" height="520" fill="url(#bg)"/>

  <!-- Faint decorative dots -->
  <g fill="#30363d" opacity="0.4">
    <circle cx="30" cy="30" r="1.2"/>
    <circle cx="1250" cy="30" r="1.2"/>
    <circle cx="30" cy="490" r="1.2"/>
    <circle cx="1250" cy="490" r="1.2"/>
  </g>

  <!-- ============================================================ -->
  <!-- HEADER: title + tagline                                        -->
  <!-- ============================================================ -->
  <g transform="translate(640, 80)" text-anchor="middle">
    <!-- Pre-title small caps badge -->
    <g transform="translate(0, -28)">
      <rect x="-78" y="-14" rx="12" ry="12" width="156" height="22" fill="rgba(210,168,255,0.10)" stroke="#3d2a5c"/>
      <text y="2" class="mono" font-size="11" fill="#d2a8ff" letter-spacing="2">
        WHAT ARE YOU DOING?
      </text>
    </g>

    <!-- Hero word "WAYD" -->
    <text y="42" class="mono" font-size="78" font-weight="800" fill="url(#titleGrad)" filter="url(#glow)" letter-spacing="4">
      WAYD
    </text>

    <!-- Tagline -->
    <text y="80" class="sans" font-size="18" fill="#c9d1d9">
      The coffee break for programmers using AI coding agents.
    </text>
    <text y="106" class="sans" font-size="14" fill="#7d8590">
      A meme-y social feed living inside Claude Code, Cursor, and Copilot. Built on GitHub Issues. No server, no signup.
    </text>
  </g>

  <!-- ============================================================ -->
  <!-- THREE-STEP STORY                                               -->
  <!-- ============================================================ -->
  <g transform="translate(72, 232)">

    <!-- ========== STEP 1: POST A VIBE ========== -->
    <g transform="translate(0, 0)">
      <use href="#stepCard"/>

      <!-- Number badge -->
      <g transform="translate(24, 26)">
        <circle cx="0" cy="0" r="18" fill="url(#numGrad)" stroke="#3d2a5c"/>
        <text x="0" y="6" text-anchor="middle" class="mono" font-size="16" font-weight="700" fill="#d2a8ff">1</text>
      </g>

      <!-- Heading -->
      <text x="56" y="32" class="sans" font-size="17" font-weight="700" fill="#c9d1d9">Post a vibe</text>

      <!-- Body -->
      <text x="24" y="64" class="sans" font-size="13" fill="#7d8590">Pick a mood, write up to 1000 chars,</text>
      <text x="24" y="82" class="sans" font-size="13" fill="#7d8590">publish under your real GitHub handle.</text>

      <!-- Mock command -->
      <g transform="translate(24, 110)">
        <rect x="0" y="0" rx="8" ry="8" width="322" height="48" fill="#0d1117" stroke="#21262d"/>
        <text x="14" y="20" class="mono" font-size="11" fill="#7d8590">$ /wayd post</text>
        <text x="14" y="38" class="mono" font-size="11" fill="#79c0ff">→ <tspan fill="#c9d1d9">git push --force on main at 23:47</tspan> 🪦</text>
      </g>
    </g>

    <!-- Arrow 1 → 2 -->
    <g transform="translate(385, 90)" fill="#484f58">
      <path d="M0,0 L18,0 M14,-5 L20,0 L14,5" stroke="#484f58" stroke-width="2" fill="none"/>
    </g>

    <!-- ========== STEP 2: SCROLL THE FEED ========== -->
    <g transform="translate(412, 0)">
      <use href="#stepCard"/>

      <g transform="translate(24, 26)">
        <circle cx="0" cy="0" r="18" fill="url(#numGrad)" stroke="#3d2a5c"/>
        <text x="0" y="6" text-anchor="middle" class="mono" font-size="16" font-weight="700" fill="#79c0ff">2</text>
      </g>

      <text x="56" y="32" class="sans" font-size="17" font-weight="700" fill="#c9d1d9">Scroll a random feed</text>

      <text x="24" y="64" class="sans" font-size="13" fill="#7d8590">See what other devs are coding through,</text>
      <text x="24" y="82" class="sans" font-size="13" fill="#7d8590">one post at a time. Random order, TikTok-style.</text>

      <!-- Mini post preview -->
      <g transform="translate(24, 110)">
        <rect x="0" y="0" rx="8" ry="8" width="322" height="48" fill="#0d1117" stroke="#21262d"/>
        <text x="14" y="18" class="mono" font-size="11" fill="#c9d1d9">🤡 <tspan fill="#7d8590">cursed-code · @anna · 2h ago</tspan></text>
        <text x="14" y="38" class="mono" font-size="10" fill="#c9d1d9">"800-line doStuff() method, written by me"</text>
      </g>
    </g>

    <!-- Arrow 2 → 3 -->
    <g transform="translate(797, 90)" fill="#484f58">
      <path d="M0,0 L18,0 M14,-5 L20,0 L14,5" stroke="#484f58" stroke-width="2" fill="none"/>
    </g>

    <!-- ========== STEP 3: REACT + REPLY ========== -->
    <g transform="translate(824, 0)">
      <use href="#stepCard"/>

      <g transform="translate(24, 26)">
        <circle cx="0" cy="0" r="18" fill="url(#numGrad)" stroke="#3d2a5c"/>
        <text x="0" y="6" text-anchor="middle" class="mono" font-size="16" font-weight="700" fill="#ff7b72">3</text>
      </g>

      <text x="56" y="32" class="sans" font-size="17" font-weight="700" fill="#c9d1d9">React, reply, repeat</text>

      <text x="24" y="64" class="sans" font-size="13" fill="#7d8590">Drop an emoji, reply with one line,</text>
      <text x="24" y="82" class="sans" font-size="13" fill="#7d8590">or just skip to the next vibe. No pressure.</text>

      <!-- Reactions row -->
      <g transform="translate(24, 110)">
        <rect x="0" y="0" rx="8" ry="8" width="322" height="48" fill="#0d1117" stroke="#21262d"/>
        <text x="14" y="20" class="mono" font-size="14" fill="#c9d1d9">😂 12  ❤️ 4  🚀 1</text>
        <text x="14" y="38" class="mono" font-size="11" fill="#7d8590">@luca: "this is why I drink"</text>
      </g>
    </g>
  </g>

  <!-- ============================================================ -->
  <!-- VIBE CHIPS at the bottom                                       -->
  <!-- ============================================================ -->
  <g transform="translate(72, 442)">
    <text x="568" y="-8" text-anchor="middle" class="mono" font-size="10" fill="#484f58" letter-spacing="2">
      8 VIBES TO CHOOSE FROM
    </text>

    <!-- 8 chips in a single row, evenly spaced -->
    <g transform="translate(0, 8)">
      <use href="#vibeChip" x="0" y="0"/>
      <text x="14" y="26" font-size="18">🤡</text>
      <text x="40" y="26" class="mono" font-size="11" fill="#c9d1d9">cursed-code</text>

      <use href="#vibeChip" x="148" y="0"/>
      <text x="162" y="26" font-size="18">🪦</text>
      <text x="188" y="26" class="mono" font-size="11" fill="#c9d1d9">rip-me</text>

      <use href="#vibeChip" x="296" y="0"/>
      <text x="310" y="26" font-size="18">🫠</text>
      <text x="336" y="26" class="mono" font-size="11" fill="#c9d1d9">brain-melt</text>

      <use href="#vibeChip" x="444" y="0"/>
      <text x="458" y="26" font-size="18">🧙</text>
      <text x="484" y="26" class="mono" font-size="11" fill="#c9d1d9">dark-arts</text>

      <use href="#vibeChip" x="592" y="0"/>
      <text x="606" y="26" font-size="18">🔥</text>
      <text x="632" y="26" class="mono" font-size="11" fill="#c9d1d9">hot-take</text>

      <use href="#vibeChip" x="740" y="0"/>
      <text x="754" y="26" font-size="18">💭</text>
      <text x="780" y="26" class="mono" font-size="10" fill="#c9d1d9">shower-thought</text>

      <use href="#vibeChip" x="888" y="0"/>
      <text x="902" y="26" font-size="18">🤔</text>
      <text x="928" y="26" class="mono" font-size="11" fill="#c9d1d9">existential</text>

      <use href="#vibeChip" x="1036" y="0"/>
      <text x="1050" y="26" font-size="18">☕</text>
      <text x="1076" y="26" class="mono" font-size="10" fill="#c9d1d9">procrastinating</text>
    </g>
  </g>
</svg>
